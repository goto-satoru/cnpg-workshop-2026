apiVersion: v1
kind: ConfigMap
metadata:
  name: minio-nginx-config
  namespace: edb
data:
  nginx.conf: |
    worker_processes 1;
    events { worker_connections 1024; }
    http {
      server {
        listen 80;
        client_max_body_size 0;

        location / {
          proxy_pass http://localhost:9000;
          
          # --- Change this to "Scality-like (unsupported environment)" ---
          
          # 1. Turn off chunked transfer encoding
          # AWS SDK requires chunked transfer for trailer checksums,
          # but rejecting it on the proxy side triggers Scality-like errors.
          chunked_transfer_encoding off;

          # 2. Turn on buffering
          # Block streaming (where checksum comes after the data) at Nginx level.
          proxy_request_buffering on;
          
          # 3. Remove unknown headers
          # Reproduce the situation where Scality's LB filters out unknown headers
          proxy_set_header x-amz-sdk-checksum-algorithm "";
          proxy_set_header x-amz-trailer "";

          proxy_http_version 1.1;
          proxy_set_header Host $host;
        }
      }
    }
---
apiVersion: v1
kind: Pod
metadata:
  name: minio-nginx-pod
  namespace: edb
  labels:
    app: minio-nginx
spec:
  containers:
  - name: nginx-proxy
    image: nginx:stable
    ports:
    - containerPort: 80
    volumeMounts:
    - name: config-volume
      mountPath: /etc/nginx/nginx.conf
      subPath: nginx.conf

  - name: minio
    image: minio/minio:latest
    ports:
    - containerPort: 9000
      name: s3api
    - containerPort: 9001
      name: console
    env:
    - name: MINIO_ROOT_USER
      value: "minio_admin"
    - name: MINIO_ROOT_PASSWORD
      value: "minio_passwd_0613"
    args:
    - "minio"
    - "server"
    - "/data"
    - "--console-address"
    - ":9001"
    volumeMounts:
    - name: minio-data
      mountPath: /data

  volumes:
  - name: config-volume
    configMap:
      name: minio-nginx-config
  - name: minio-data
    emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: minio-nginx-service
  namespace: edb
spec:
  type: NodePort
  selector:
    app: minio-nginx
  ports:
  - name: http
    protocol: TCP
    port: 80
    targetPort: 80
  - name: console
    protocol: TCP
    port: 9001
    targetPort: 9001
    nodePort: 30900
