---
apiVersion: v1
kind: Namespace
metadata:
  name: edb
---
apiVersion: v1
kind: Secret
metadata:
  name: backup-storage-creds
  namespace: edb
type: Opaque
stringData:
  ACCESS_KEY_ID: minio_admin
  SECRET_ACCESS_KEY: minio_passwd_1613
  AWS_REGION: us-east-1
---
apiVersion: postgresql.k8s.enterprisedb.io/v1
kind: Cluster
metadata:
  name: epas16
  namespace: edb
spec:
  instances: 3
  imageName: docker.enterprisedb.com/k8s/edb-postgres-advanced:16.13
  imagePullSecrets:
  - name: edb-pull-secret
  postgresql:
    parameters:
      # to mimic 'replication slot cannot be advanced' Error 
      max_slot_wal_keep_size: "8MB"
      wal_keep_size: "0"
      # to frequently trigger checkpoints and promote WAL recycling
      min_wal_size: "8MB"
      max_wal_size: "16MB"
      checkpoint_timeout: "30s"
  storage:
    size: 1Gi

  #---------------------------------------------------------------
  # Backup configuration - MinIO
  backup:
    retentionPolicy: "7d" # Keep backups for 7 days
    barmanObjectStore:
      destinationPath: "s3://barman"
      endpointURL: "http://minio.edb.svc.cluster.local:9000"
      s3Credentials:
        accessKeyId:
          name: backup-storage-creds
          key: ACCESS_KEY_ID
        secretAccessKey:
          name: backup-storage-creds
          key: SECRET_ACCESS_KEY
      wal:
        compression: gzip
        maxParallel: 2
