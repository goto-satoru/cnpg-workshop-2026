---
apiVersion: v1
kind: Namespace
metadata:
  name: edb
---
apiVersion: v1
kind: Secret
metadata:
  name: backup-storage-creds
  namespace: edb
  annotations:
    alpha.k8s.enterprisedb.io/unrecoverable: "true"
type: Opaque
stringData:
  ACCESS_KEY_ID: minio_admin
  SECRET_ACCESS_KEY: minio_passwd_1614
  AWS_REGION: us-east-1
---
apiVersion: postgresql.k8s.enterprisedb.io/v1
kind: Cluster
metadata:
  name: pg16
  namespace: edb
spec:
  instances: 3
  imageName: ghcr.io/cloudnative-pg/postgresql:16.14
  storage:
    size: 1Gi
  #---------------------------------------------------------------
  # Backup configuration - MinIO
  backup:
    retentionPolicy: "1d" # Keep backups for 1 day
    barmanObjectStore:
      destinationPath: "s3://barman"
      endpointURL: "http://minio.edb.svc.cluster.local:9000"
      s3Credentials:
        accessKeyId:
          name: backup-storage-creds
          key: ACCESS_KEY_ID
        secretAccessKey:
          name: backup-storage-creds
          key: SECRET_ACCESS_KEY
      wal:
        compression: gzip
        maxParallel: 2
