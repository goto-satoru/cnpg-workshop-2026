apiVersion: postgresql.k8s.enterprisedb.io/v1
kind: Cluster
metadata:
  name: epas16-r
  namespace: edb
spec:
  instances: 3
  imageName: docker.enterprisedb.com/k8s/edb-postgres-advanced:16.11
  imagePullSecrets:
  - name: edb-pull-secret
  storage:
    size: 1Gi
  # Bootstrap from backup
  bootstrap:
    recovery:
      # Source cluster configuration - must match externalClusters name
      source: cluster-backup-source
      # Restore to specific backup
      backup:
        name: epas16-20260228154506

  # External cluster definition for restore
  externalClusters:
  - name: cluster-backup-source
    barmanObjectStore:
      destinationPath: "s3://barman"
      endpointURL: "http://minio.edb.svc.cluster.local:9000"
      s3Credentials:
        accessKeyId:
          name: backup-storage-creds
          key: ACCESS_KEY_ID
        secretAccessKey:
          name: backup-storage-creds
          key: SECRET_ACCESS_KEY
      wal:
        compression: gzip
